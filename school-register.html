<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>School Register | Lakeview Academy</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="lakeview.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="style.css" rel="stylesheet"/>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased transition-colors duration-300">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md">
<div class="w-full px-6 lg:px-10">
<div class="flex h-16 items-center justify-between gap-4">
<div class="flex items-center gap-8">
<a class="flex items-center gap-2 group" href="admin-dashboard.html">
<div class="p-1.5 bg-primary rounded-lg text-white">
<span class="material-symbols-outlined block text-3xl">school</span>
</div>
<h1 class="text-2xl font-black tracking-tight text-slate-900 dark:text-white uppercase">Lakeview Admin</h1>
</a>
</div>
<div class="flex items-center gap-4">
<a href="admin-dashboard.html" class="text-sm font-bold text-slate-500 hover:text-primary transition-colors flex items-center gap-1">
    <span class="material-symbols-outlined text-lg">arrow_back</span> Dashboard
</a>
</div>
</div>
</div>
</header>

<main class="flex-grow w-full px-6 lg:px-10 py-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header & Controls -->
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-8">
            <div>
                <h2 class="text-3xl font-black tracking-tight mb-2">Daily Attendance Register</h2>
                <p class="text-slate-500 dark:text-slate-400">Record student presence for each school day.</p>
            </div>
            <div class="flex items-center gap-3 bg-white dark:bg-slate-900 p-2 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <select id="gradeSelect" class="bg-transparent border-none font-bold text-sm focus:ring-0 cursor-pointer text-slate-700 dark:text-slate-200">
                    <option value="K">Kindergarten</option>
                    <option value="1">Grade 1</option>
                    <option value="2">Grade 2</option>
                    <option value="3">Grade 3</option>
                    <option value="4">Grade 4</option>
                    <option value="5">Grade 5</option>
                    <option value="6">Grade 6</option>
                    <option value="7">Grade 7</option>
                    <option value="8">Grade 8</option>
                    <option value="9">Grade 9</option>
                    <option value="10">Grade 10</option>
                    <option value="11">Grade 11</option>
                    <option value="12">Grade 12</option>
                </select>
                <div class="w-px h-6 bg-slate-200 dark:bg-slate-700"></div>
                <select id="monthSelect" class="bg-transparent border-none font-bold text-sm focus:ring-0 cursor-pointer text-slate-700 dark:text-slate-200">
                    <option value="0">January</option>
                    <option value="1">February</option>
                    <option value="2">March</option>
                    <option value="3">April</option>
                    <option value="4">May</option>
                    <option value="5">June</option>
                    <option value="6">July</option>
                    <option value="7">August</option>
                    <option value="8">September</option>
                    <option value="9">October</option>
                    <option value="10">November</option>
                    <option value="11">December</option>
                </select>
                <div class="w-px h-6 bg-slate-200 dark:bg-slate-700"></div>
                <select id="yearSelect" class="bg-transparent border-none font-bold text-sm focus:ring-0 cursor-pointer text-slate-700 dark:text-slate-200">
                    <!-- Years populated by JS -->
                </select>
            </div>
        </div>

        <!-- Calendar Grid -->
        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
            <!-- Days Header -->
            <div class="grid grid-cols-7 border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50">
                <div class="py-3 text-center text-xs font-bold uppercase text-slate-400">Sun</div>
                <div class="py-3 text-center text-xs font-bold uppercase text-slate-400">Mon</div>
                <div class="py-3 text-center text-xs font-bold uppercase text-slate-400">Tue</div>
                <div class="py-3 text-center text-xs font-bold uppercase text-slate-400">Wed</div>
                <div class="py-3 text-center text-xs font-bold uppercase text-slate-400">Thu</div>
                <div class="py-3 text-center text-xs font-bold uppercase text-slate-400">Fri</div>
                <div class="py-3 text-center text-xs font-bold uppercase text-slate-400">Sat</div>
            </div>
            
            <!-- Calendar Body -->
            <div id="calendarGrid" class="grid grid-cols-7 auto-rows-fr bg-slate-200 dark:bg-slate-800 gap-px border-b border-slate-200 dark:border-slate-800">
                <!-- Days will be injected here via JS -->
            </div>
        </div>

        <div class="mt-6 flex justify-end">
            <button class="bg-primary hover:bg-primary/90 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined">save</span>
                Save Changes
            </button>
        </div>
    </div>
</main>

<script>
    const gradeSelect = document.getElementById('gradeSelect');
    const monthSelect = document.getElementById('monthSelect');
    const yearSelect = document.getElementById('yearSelect');
    const calendarGrid = document.getElementById('calendarGrid');

    function initCalendar() {
        const now = new Date();
        const currentYear = now.getFullYear();
        
        // Populate Year Select (Current - 1 to Current + 2)
        for (let y = currentYear - 1; y <= currentYear + 2; y++) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y;
            if (y === currentYear) opt.selected = true;
            yearSelect.appendChild(opt);
        }

        // Set current month
        monthSelect.value = now.getMonth();

        // Render initial view
        renderCalendar();

        // Event Listeners
        gradeSelect.addEventListener('change', renderCalendar);
        monthSelect.addEventListener('change', renderCalendar);
        yearSelect.addEventListener('change', renderCalendar);
    }

    function renderCalendar() {
        const year = parseInt(yearSelect.value);
        const month = parseInt(monthSelect.value);
        
        calendarGrid.innerHTML = '';

        const firstDay = new Date(year, month, 1);
        const startingDay = firstDay.getDay(); // 0 = Sunday
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        // Empty slots for previous month
        for (let i = 0; i < startingDay; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = "bg-slate-50 dark:bg-slate-900/50 min-h-[120px]";
            calendarGrid.appendChild(emptyCell);
        }

        // Days of the month
        for (let day = 1; day <= daysInMonth; day++) {
            const cell = document.createElement('div');
            cell.className = "bg-white dark:bg-slate-900 min-h-[120px] p-3 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors flex flex-col justify-between group";
            
            cell.innerHTML = `
                <span class="font-bold text-slate-700 dark:text-slate-300 text-sm mb-2 block">${day}</span>
                <div>
                    <label class="text-[10px] uppercase font-bold text-slate-400 mb-1 block">Students Present</label>
                    <input type="number" min="0" class="w-full text-sm p-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="0">
                </div>
            `;
            calendarGrid.appendChild(cell);
        }
    }

    document.addEventListener('DOMContentLoaded', initCalendar);
</script>
</body>
</html>
