<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Staff Directory | Lakeview Academy</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="lakeview.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="style.css" rel="stylesheet"/>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased transition-colors duration-300">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md">
<div class="w-full px-6 lg:px-10">
<div class="flex h-16 items-center justify-between gap-4">
<div class="flex items-center gap-8">
<a class="flex items-center gap-2 group" href="admin-dashboard.html">
<div class="p-1.5 bg-primary rounded-lg text-white">
<span class="material-symbols-outlined block text-3xl">school</span>
</div>
<h1 class="text-2xl font-black tracking-tight text-slate-900 dark:text-white uppercase">Lakeview Admin</h1>
</a>
</div>
<div class="flex items-center gap-4">
<a href="admin-dashboard.html" class="text-sm font-bold text-slate-500 hover:text-primary transition-colors flex items-center gap-1">
    <span class="material-symbols-outlined text-lg">arrow_back</span> Dashboard
</a>
</div>
</div>
</div>
</header>

<main class="flex-grow w-full px-6 lg:px-10 py-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex items-end justify-between mb-8">
            <div>
                <h2 class="text-3xl font-black tracking-tight mb-2">Staff Directory</h2>
                <p class="text-slate-500 dark:text-slate-400">Manage registered faculty and administration members.</p>
            </div>
            <button class="bg-primary text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined">person_add</span> Add Staff
            </button>
        </div>

        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-slate-50 dark:bg-slate-800/50 text-slate-500 uppercase text-xs font-bold">
                        <tr>
                            <th class="px-6 py-4">Name</th>
                            <th class="px-6 py-4">Role</th>
                            <th class="px-6 py-4">Department</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="staff-table-body" class="divide-y divide-slate-100 dark:divide-slate-800">
                        <!-- Static Data -->
                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                            <td class="px-6 py-4 font-bold flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center font-bold">ER</div>
                                Dr. Elena Rodriguez
                            </td>
                            <td class="px-6 py-4">Head of School</td>
                            <td class="px-6 py-4">Administration</td>
                            <td class="px-6 py-4"><span class="inline-flex items-center gap-1 text-green-600 bg-green-50 dark:bg-green-900/20 px-2 py-1 rounded text-xs font-bold">Active</span></td>
                            <td class="px-6 py-4 text-right"><button class="text-slate-400 hover:text-primary"><span class="material-symbols-outlined">more_vert</span></button></td>
                        </tr>
                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                            <td class="px-6 py-4 font-bold flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold">MS</div>
                                Marcus Sterling
                            </td>
                            <td class="px-6 py-4">Academic Dean</td>
                            <td class="px-6 py-4">Academics</td>
                            <td class="px-6 py-4"><span class="inline-flex items-center gap-1 text-green-600 bg-green-50 dark:bg-green-900/20 px-2 py-1 rounded text-xs font-bold">Active</span></td>
                            <td class="px-6 py-4 text-right"><button class="text-slate-400 hover:text-primary"><span class="material-symbols-outlined">more_vert</span></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const tableBody = document.getElementById('staff-table-body');
        const activities = JSON.parse(localStorage.getItem('lakeview_activities') || '[]');
        
        // Filter for "New Staff Registration" events to simulate database
        const newStaff = activities.filter(a => a.action === 'New Staff Registration');

        newStaff.forEach(staff => {
            const initials = staff.user.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            const row = `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                    <td class="px-6 py-4 font-bold flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center font-bold">${initials}</div>
                        ${staff.user}
                    </td>
                    <td class="px-6 py-4">Faculty</td>
                    <td class="px-6 py-4">General</td>
                    <td class="px-6 py-4"><span class="inline-flex items-center gap-1 text-green-600 bg-green-50 dark:bg-green-900/20 px-2 py-1 rounded text-xs font-bold">Active</span></td>
                    <td class="px-6 py-4 text-right"><button class="text-slate-400 hover:text-primary"><span class="material-symbols-outlined">more_vert</span></button></td>
                </tr>
            `;
            tableBody.insertAdjacentHTML('beforeend', row);
        });
    });
</script>
</body>
</html>
