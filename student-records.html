<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Student Records | Lakeview Academy</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="lakeview.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="style.css" rel="stylesheet"/>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased transition-colors duration-300">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md">
<div class="w-full px-6 lg:px-10">
<div class="flex h-16 items-center justify-between gap-4">
<div class="flex items-center gap-8">
<a class="flex items-center gap-2 group" href="admin-dashboard.html">
<div class="p-1.5 bg-primary rounded-lg text-white">
<span class="material-symbols-outlined block text-3xl">school</span>
</div>
<h1 class="text-2xl font-black tracking-tight text-slate-900 dark:text-white uppercase">Lakeview Admin</h1>
</a>
</div>
<div class="flex items-center gap-4">
<a href="admin-dashboard.html" class="text-sm font-bold text-slate-500 hover:text-primary transition-colors flex items-center gap-1">
    <span class="material-symbols-outlined text-lg">arrow_back</span> Dashboard
</a>
</div>
</div>
</div>
</header>

<main class="flex-grow w-full px-6 lg:px-10 py-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-8">
            <div>
                <h2 class="text-3xl font-black tracking-tight mb-2">Student Records</h2>
                <p class="text-slate-500 dark:text-slate-400">View and manage student profiles categorized by grade.</p>
            </div>
            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                <input type="text" placeholder="Search students..." class="pl-10 pr-4 py-2 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:ring-primary focus:border-primary w-64">
            </div>
        </div>

        <!-- Grade Tabs -->
        <div class="flex overflow-x-auto no-scrollbar gap-2 mb-6 pb-2">
            <button onclick="filterGrade('all')" class="grade-tab active px-5 py-2 rounded-full bg-primary text-white font-bold text-sm whitespace-nowrap transition-all">All Students</button>
            <button onclick="filterGrade('9')" class="grade-tab px-5 py-2 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-primary text-slate-600 dark:text-slate-300 font-bold text-sm whitespace-nowrap transition-all">Grade 9</button>
            <button onclick="filterGrade('10')" class="grade-tab px-5 py-2 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-primary text-slate-600 dark:text-slate-300 font-bold text-sm whitespace-nowrap transition-all">Grade 10</button>
            <button onclick="filterGrade('11')" class="grade-tab px-5 py-2 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-primary text-slate-600 dark:text-slate-300 font-bold text-sm whitespace-nowrap transition-all">Grade 11</button>
            <button onclick="filterGrade('12')" class="grade-tab px-5 py-2 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-primary text-slate-600 dark:text-slate-300 font-bold text-sm whitespace-nowrap transition-all">Grade 12</button>
        </div>

        <!-- Students Table -->
        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-slate-50 dark:bg-slate-800/50 text-slate-500 uppercase text-xs font-bold">
                        <tr>
                            <th class="px-6 py-4">Student Name</th>
                            <th class="px-6 py-4">Grade</th>
                            <th class="px-6 py-4">ID Number</th>
                            <th class="px-6 py-4">GPA</th>
                            <th class="px-6 py-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="students-table-body" class="divide-y divide-slate-100 dark:divide-slate-800">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script>
    const students = [
        { name: "James Cameron", grade: "9", id: "ST-2024-001", gpa: "3.8" },
        { name: "Sarah Connor", grade: "10", id: "ST-2023-042", gpa: "4.0" },
        { name: "John Reese", grade: "11", id: "ST-2022-108", gpa: "3.5" },
        { name: "Ellen Ripley", grade: "12", id: "ST-2021-007", gpa: "3.9" },
        { name: "Marty McFly", grade: "9", id: "ST-2024-015", gpa: "3.2" },
        { name: "Luke Skywalker", grade: "12", id: "ST-2021-088", gpa: "3.7" },
        { name: "Hermione Granger", grade: "10", id: "ST-2023-001", gpa: "4.0" },
        { name: "Tony Stark", grade: "11", id: "ST-2022-099", gpa: "4.0" }
    ];

    function renderStudents(filter = 'all') {
        const tbody = document.getElementById('students-table-body');
        tbody.innerHTML = '';

        const filtered = filter === 'all' ? students : students.filter(s => s.grade === filter);

        filtered.forEach(s => {
            const row = `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                    <td class="px-6 py-4 font-bold">${s.name}</td>
                    <td class="px-6 py-4"><span class="bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded text-xs font-bold">Grade ${s.grade}</span></td>
                    <td class="px-6 py-4 text-slate-500">${s.id}</td>
                    <td class="px-6 py-4 font-medium">${s.gpa}</td>
                    <td class="px-6 py-4 text-right"><button class="text-primary font-bold text-xs hover:underline">View Profile</button></td>
                </tr>
            `;
            tbody.insertAdjacentHTML('beforeend', row);
        });
    }

    function filterGrade(grade) {
        // Update UI tabs
        document.querySelectorAll('.grade-tab').forEach(btn => {
            btn.classList.remove('bg-primary', 'text-white');
            btn.classList.add('bg-white', 'dark:bg-slate-900', 'text-slate-600', 'dark:text-slate-300', 'border');
        });
        
        // Find the clicked button (event target logic simplified for this example)
        const activeBtn = Array.from(document.querySelectorAll('.grade-tab')).find(b => b.textContent.includes(grade === 'all' ? 'All' : grade));
        if(activeBtn) {
            activeBtn.classList.remove('bg-white', 'dark:bg-slate-900', 'text-slate-600', 'dark:text-slate-300', 'border');
            activeBtn.classList.add('bg-primary', 'text-white');
        }

        renderStudents(grade);
    }

    // Initial render
    document.addEventListener('DOMContentLoaded', () => renderStudents());
</script>
</body>
</html>
