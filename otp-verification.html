<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>OTP Verification | Lakeview Academy</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="lakeview.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="style.css" rel="stylesheet"/>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col transition-colors duration-300">
    <!-- Header -->
    <header class="w-full px-6 py-4 flex items-center justify-between bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-primary p-2 rounded-lg text-white flex items-center justify-center">
                <span class="material-symbols-outlined !text-2xl">school</span>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-background-dark dark:text-white">
                Lakeview <span class="text-primary">Academy</span>
            </h1>
        </div>
        <a class="text-sm font-semibold text-primary hover:text-primary/80 flex items-center gap-1 transition-colors" href="index.html">
            <span class="material-symbols-outlined !text-lg">arrow_back</span>
            Back to Website
        </a>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center p-6 relative overflow-hidden">
        <!-- Background decoration -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full -z-10 opacity-10 dark:opacity-20 pointer-events-none">
            <div class="absolute top-[-10%] right-[-5%] w-[500px] h-[500px] bg-primary rounded-full blur-[120px]"></div>
            <div class="absolute bottom-[-10%] left-[-5%] w-[400px] h-[400px] bg-primary/40 rounded-full blur-[100px]"></div>
        </div>

        <div class="w-full max-w-md">
            <!-- OTP Card -->
            <div class="bg-white dark:bg-[#2d1e16] shadow-2xl rounded-xl border border-primary/10 overflow-hidden">
                <div class="px-8 py-10 relative z-20">
                    <!-- Icon -->
                    <div class="mx-auto w-16 h-16 bg-primary rounded-xl flex items-center justify-center shadow-lg mb-6 border-4 border-white dark:border-[#2d1e16]">
                        <span class="material-symbols-outlined !text-4xl text-white">password</span>
                    </div>
                    <div class="text-center mb-8">
                        <h2 class="text-2xl font-bold text-background-dark dark:text-white">Email Verification</h2>
                        <p class="text-background-dark/60 dark:text-white/60 text-sm mt-2">
                            An OTP has been sent to your email address. Please enter it below to sign in.
                        </p>
                    </div>

                    <!-- OTP Form -->
                    <form id="otpForm" class="space-y-5" onsubmit="handleVerify(event)">
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-background-dark/80 dark:text-white/80" for="otp">
                                One-Time Password (OTP)
                            </label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-background-dark/40 dark:text-white/40 !text-xl">pin</span>
                                <input class="w-full text-center tracking-[1em] pl-12 pr-4 py-3 bg-background-light dark:bg-background-dark/50 border border-primary/20 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-background-dark/30 dark:placeholder:text-white/30 text-background-dark dark:text-white" id="otp" name="otp" placeholder="••••••••" required="" type="text" maxlength="8"/>
                            </div>
                        </div>

                        <div class="text-center">
                            <a id="resend-otp" class="text-xs font-medium text-primary hover:underline" href="#">Didn't receive the code? Resend OTP</a>
                        </div>

                        <button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg shadow-md shadow-primary/20 transition-all flex items-center justify-center gap-2 group" type="submit">
                            <span>Verify & Complete Registration</span>
                            <span class="material-symbols-outlined !text-xl group-hover:translate-x-1 transition-transform">verified_user</span>
                        </button>
                    </form>

                    <!-- Footer Info -->
                    <div class="mt-8 pt-6 border-t border-primary/10 text-center">
                        <p class="text-xs text-background-dark/50 dark:text-white/40 flex items-center justify-center gap-1">
                            <span class="material-symbols-outlined !text-sm">help</span>
                            Having trouble? 
                            <a class="text-primary font-semibold hover:underline" href="contact.html">Contact Support</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const otpInput = document.getElementById('otp');
        const otpForm = document.getElementById('otpForm');
        const resendLink = document.getElementById('resend-otp');
        const submitButton = otpForm.querySelector('button[type="submit"]');
        let isVerifying = false;

        async function handleVerify(e) {
            if (e) e.preventDefault();
            if (isVerifying) return;
            
            const otp = otpInput.value;
            const email = localStorage.getItem('pendingEmail');

            if (!email) {
                alert('No pending registration found. Please register first.');
                window.location.href = 'portal.html';
                return;
            }

            if (otp.length !== 8) return;

            isVerifying = true;
            submitButton.disabled = true;
            submitButton.innerHTML = `<span>Verifying...</span><span class="material-symbols-outlined !text-xl animate-spin">progress_activity</span>`;
            otpInput.disabled = true;

            const { data, error } = await sb.auth.verifyOtp({ email, token: otp, type: 'signup' });

            if (error) {
                alert('Verification failed: ' + error.message);
                isVerifying = false;
                submitButton.disabled = false;
                submitButton.innerHTML = `<span>Verify & Complete Registration</span><span class="material-symbols-outlined !text-xl group-hover:translate-x-1 transition-transform">verified_user</span>`;
                otpInput.disabled = false;
                otpInput.focus();
            } else {
                // Log system activity
                const name = localStorage.getItem('pendingName') || email;
                const activities = JSON.parse(localStorage.getItem('lakeview_activities') || '[]');
                activities.unshift({
                    user: name,
                    action: 'Account Verified',
                    date: new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: 'numeric', hour12: true }),
                    status: 'Success'
                });
                localStorage.setItem('lakeview_activities', JSON.stringify(activities));

                alert('Verification successful! You are now logged in.');
                // The user is now logged in, redirect to the dashboard.
                window.location.href = 'admin-dashboard.html';
            }
        }

        // Add resend functionality
        resendLink.addEventListener('click', async (e) => {
            e.preventDefault();
            if (isVerifying) return;

            const email = localStorage.getItem('pendingEmail');
            if (!email) {
                alert('No pending registration found. Please go back and enter your email.');
                return;
            }

            resendLink.textContent = 'Sending...';
            try {
                const { error } = await sb.auth.resend({ type: 'signup', email: email });
                if (error) throw error;
                alert('A new verification code has been sent to your email.');
            } catch (error) {
                alert('Error resending code: ' + error.message);
            } finally {
                resendLink.textContent = "Didn't receive the code? Resend OTP";
            }
        });

        // Auto-submit when 8 characters are entered
        otpInput.addEventListener('input', () => {
            if (otpInput.value.length === otpInput.maxLength) {
                handleVerify();
            }
        });
    </script>
</body>
</html>
